version: '3.8'

services:
  # PHP-FPM service
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symfony_php
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - APP_DEBUG=${APP_DEBUG:-0}
      - APP_DOMAIN=${APP_DOMAIN:-localhost}
      - JWT_PASSPHRASE=${JWT_PASSPHRASE}
      - DATABASE_URL=${DATABASE_URL}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-"EventBooking"}
    volumes:
      - ./config/jwt:/var/www/config/jwt:ro
      - ./var:/var/www/var
      - ./public/uploads:/var/www/public/uploads
    depends_on:
      - db
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx web server
  nginx:
    image: nginx:alpine
    container_name: symfony_nginx
    ports:
      - "80:80"
      - "443:443"  # HTTPS port
    volumes:
      - ./public:/var/www/public:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/ssl:/etc/nginx/ssl:ro  # SSL certificates for HTTPS
      - ./var/log/nginx:/var/log/nginx
    depends_on:
      - php
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Database service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: symfony_db
    environment:
      - POSTGRES_DB=${DB_NAME:-app}
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for sessions/cache (optional)
  redis:
    image: redis:7-alpine
    container_name: symfony_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mailhog for email testing (development only)
  mailhog:
    image: mailhog/mailhog
    container_name: symfony_mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web interface
    networks:
      - app_network
    profiles:
      - dev

  # Adminer for database management (optional)
  adminer:
    image: adminer
    container_name: symfony_adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
    networks:
      - app_network
    profiles:
      - dev

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: